version: "3.9"

services:
  agent:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"          # HITL approval webhook
    env_file:
      - .env
    volumes:
      - ./logs:/var/log      # persist agent logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
